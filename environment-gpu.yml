name: cvcl-cluster-gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.10
  - matplotlib>=3.7
  - joblib>=1.3
  - pytest>=7.0
  - pytorch>=2.0
  # Compatible with NVIDIA driver 535.x hosts reporting CUDA 12.2 in nvidia-smi.
  - pytorch-cuda=12.1
  # Install RAPIDS/cuML separately with a version matching the target CUDA
  # stack when running GPU-first clustering on the A800 host.
