queries:
  - query_id: "volatile_high_tension"
    description: "low valence + high arousal + high cross-modal tension"
    target_cluster: "C2"
    target_va: "low_valence_high_arousal"
    target_tension_direction:
      da: "positive"
    target_tension_strength: "high"
    target_complexity: "complex_or_high"
    external_relevance_rubric: "Relevant if an external review indicates aggression, tension, rage, conflict, political anger, war, social anxiety, harshness, or confrontational energy. Strong relevance if the review also indicates semantic or lyrical intensification."
  - query_id: "bittersweet_lyrical_lift"
    description: "subdued melancholy with lyric-side uplift or intensification"
    target_cluster: "C0"
    target_va: "low_valence_low_arousal"
    target_tension_direction:
      dv: "positive"
      da: "positive"
    target_tension_strength: "moderate_or_high"
    target_complexity: "mild_or_complex"
    external_relevance_rubric: "Relevant if an external review indicates melancholy, mournful sadness, restraint, vulnerability, or introspection. Strong relevance if it also indicates emotional lift, vocal or lyrical intensity, poignancy, bittersweetness, or expressive contrast."
  - query_id: "gentle_warmth_lyrical_lift"
    description: "gentle warmth with lyric-side warmth or emotional lift"
    target_cluster: "C1"
    target_va: "mid_positive_low_arousal"
    target_tension_direction:
      dv: "positive"
      da: "positive"
    target_tension_strength: "moderate_or_high"
    external_relevance_rubric: "Relevant if an external review indicates warmth, tenderness, softness, calmness, friendship, romance, healing, or intimacy. Strong relevance if it also indicates emotional intensification or lyrical/vocal uplift."
  - query_id: "audio_led_exuberance_dark_lyrics"
    description: "positive energetic song with darker or softer lyric-side undercurrent"
    target_cluster: "C3"
    target_va: "high_valence_high_arousal"
    target_tension_direction:
      dv: "negative"
      da: "negative"
    target_tension_strength: "moderate_or_high"
    target_complexity: "complex_or_high"
    external_relevance_rubric: "Relevant if an external review indicates bright, danceable, celebratory, euphoric, energetic, or party-like musical affect. Strong relevance if the review also indicates grief, loss, heartbreak, darkness, melancholy, or contrast beneath the energetic surface."
  - query_id: "boundary_or_ambivalent_affect"
    description: "boundary blend or emotionally ambivalent song"
    target_cluster: "any"
    target_complexity: "high"
    target_region_mixture: "boundary_blend_or_strong_secondary_affect"
    external_relevance_rubric: "Relevant if an external review indicates mixed mood, ambiguity, irony, bittersweetness, tonal contradiction, joyful sadness, dark celebration, or emotional ambivalence. Strong relevance if the review explicitly describes contrast between sound and lyrical/semantic content."
  - query_id: "concordant_region_prototype"
    description: "clean affective prototype with low tension"
    target_cluster: "any"
    target_tension_strength: "low"
    target_region_role: "prototype_or_representative"
    target_complexity: "simple"
    external_relevance_rubric: "Relevant if an external review strongly matches the assigned region affect. Strong relevance if the review supports both the region affect and the absence of strong contradiction."
